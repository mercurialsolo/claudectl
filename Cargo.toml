[package]
name = "claudectl"
version = "0.8.1"
edition = "2024"
description = "TUI for monitoring and managing Claude Code CLI agents"
license = "MIT"
repository = "https://github.com/mercurialsolo/claudectl"

[[bin]]
name = "claudectl"
path = "src/main.rs"

[lib]
name = "claudectl"
path = "src/lib.rs"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
libc = "0.2"

[dev-dependencies]
tempfile = "3"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true
panic = "abort"
