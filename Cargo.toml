[package]
name = "claudectl"
version = "0.32.1"
edition = "2024"
description = "Auto-pilot for Claude Code — a local model watches every session and decides what to approve"
license = "MIT"
repository = "https://github.com/mercurialsolo/claudectl"
homepage = "https://mercurialsolo.github.io/claudectl/"
keywords = ["claude-code", "auto-approve", "local-llm", "tui", "ollama"]
categories = ["command-line-utilities", "development-tools"]
exclude = ["*.gif", "*.cast", "claude-demo.*", "CLAUDE.md", ".github/"]

[[bin]]
name = "claudectl"
path = "src/main.rs"

# Side-by-side install target for verifying refactor branches against the
# stable `claudectl` binary on the same machine. Build the same source
# with `cargo install --path . --bin claudectl_test` and run it as
# `claudectl_test` while the old binary stays in place. Once the new
# code is validated, drop this entry (or just stop installing the alias).
[[bin]]
name = "claudectl_test"
path = "src/main.rs"

[lib]
name = "claudectl"
path = "src/lib.rs"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
libc = "0.2"
ctrlc = "3"
# Used to keep filesystem I/O and process spawning off the main render
# thread. We only need rt-multi-thread + time + sync + macros — no
# tokio::fs / tokio::process: blocking I/O runs on tokio::task::spawn_blocking
# so existing std::fs / std::process::Command call sites stay untouched.
tokio = { version = "1", features = ["rt-multi-thread", "time", "sync", "macros"] }

[dev-dependencies]
tempfile = "3"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true
panic = "abort"
