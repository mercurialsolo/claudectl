[package]
name = "claudectl"
version = "0.25.0"
edition = "2024"
description = "Mission control for Claude Code — supervise, budget, orchestrate, and auto-pilot sessions with a local LLM brain"
license = "MIT"
repository = "https://github.com/mercurialsolo/claudectl"
homepage = "https://mercurialsolo.github.io/claudectl/"
keywords = ["claude-code", "claude", "tui", "dashboard", "agent"]
categories = ["command-line-utilities", "development-tools"]
exclude = ["*.gif", "*.cast", "claude-demo.*", "CLAUDE.md", ".github/"]

[[bin]]
name = "claudectl"
path = "src/main.rs"

[lib]
name = "claudectl"
path = "src/lib.rs"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
libc = "0.2"
ctrlc = "3"

[dev-dependencies]
tempfile = "3"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true
panic = "abort"
