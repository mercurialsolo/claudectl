name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure Cargo version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          test "$TAG" = "$VERSION"

  build:
    name: Build (${{ matrix.target }})
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi
          # When `coord` / `bus` features are on, rusqlite's bundled
          # SQLite is compiled with FORTIFY_SOURCE wrappers
          # (__memcpy_chk, __memset_chk, open64, stat64) that live in
          # glibc but not musl. Disable FORTIFY across the board for the
          # musl builds so libsqlite3_sys links cleanly. This is the
          # same workaround other Rust-on-musl projects use (alacritty,
          # zellij, etc.).
          echo "CFLAGS_${{ matrix.target }}=-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0" >> $GITHUB_ENV
          echo "CFLAGS=-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        # #321 — release tarballs (and therefore Homebrew bottles) include
        # every optional feature so `claudectl bus`, `coord`, `relay`, and
        # `hive` all work out of the box. Cargo-install users still get
        # the default (`hive`) build; they can opt in with
        # `cargo install claudectl --features bus,coord,relay,hive`.
        # The async runtime exception is already documented in CLAUDE.md.
        run: |
          cargo build --release \
            --target ${{ matrix.target }} \
            --features "bus,coord,relay,hive"

      - name: Package
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          cd target/${{ matrix.target }}/release
          tar czf ../../../claudectl-${TAG}-${{ matrix.target }}.tar.gz claudectl
          cd ../../..
          shasum -a 256 claudectl-${TAG}-${{ matrix.target }}.tar.gz > claudectl-${TAG}-${{ matrix.target }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: claudectl-${{ matrix.target }}
          path: |
            claudectl-*.tar.gz
            claudectl-*.tar.gz.sha256

  # crates.io publish order: claudectl-core → claudectl-tui → claudectl.
  # Each downstream publish needs the previous one to be visible on
  # crates.io, which can lag the upload by 30s–2min. We poll the
  # crates.io HTTP API (not `cargo search` — Actions caches its
  # registry index aggressively) with a hard cap so a hung index never
  # blocks the whole pipeline forever.
  publish-crate-core:
    name: Publish claudectl-core
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish claudectl-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -e
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/claudectl-core/Cargo.toml | head -n 1)
          # Idempotent: skip if this version is already on crates.io.
          FOUND=$(curl -sS -A "claudectl-release-workflow" \
            "https://crates.io/api/v1/crates/claudectl-core/${VERSION}" \
            | grep -o "\"num\":\"${VERSION}\"" | head -n 1 || true)
          if [ -n "$FOUND" ]; then
            echo "claudectl-core ${VERSION} already on crates.io, skipping"
          else
            cargo publish -p claudectl-core --locked --token "$CARGO_REGISTRY_TOKEN"
          fi

  publish-crate-tui:
    name: Publish claudectl-tui
    needs: publish-crate-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Wait for claudectl-core on crates.io
        # `cargo search` reads the local registry index, which the GitHub
        # Actions runner caches and is slow to refresh. Hit the crates.io
        # HTTP API directly so we see a fresh result every call.
        run: |
          set -e
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/claudectl-core/Cargo.toml | head -n 1)
          for i in $(seq 1 30); do
            FOUND=$(curl -sS -A "claudectl-release-workflow" \
              "https://crates.io/api/v1/crates/claudectl-core/${VERSION}" \
              | grep -o "\"num\":\"${VERSION}\"" | head -n 1 || true)
            if [ -n "$FOUND" ]; then
              echo "claudectl-core ${VERSION} visible on crates.io"
              exit 0
            fi
            echo "waiting for claudectl-core ${VERSION} (attempt ${i}/30)..."
            sleep 10
          done
          echo "::error::claudectl-core ${VERSION} never appeared on crates.io after 5 minutes"
          exit 1
      - name: Publish claudectl-tui
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -e
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/claudectl-tui/Cargo.toml | head -n 1)
          FOUND=$(curl -sS -A "claudectl-release-workflow" \
            "https://crates.io/api/v1/crates/claudectl-tui/${VERSION}" \
            | grep -o "\"num\":\"${VERSION}\"" | head -n 1 || true)
          if [ -n "$FOUND" ]; then
            echo "claudectl-tui ${VERSION} already on crates.io, skipping"
          else
            cargo publish -p claudectl-tui --locked --token "$CARGO_REGISTRY_TOKEN"
          fi

  publish-crate:
    name: Publish claudectl (binary)
    needs: publish-crate-tui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Wait for claudectl-tui on crates.io
        run: |
          set -e
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/claudectl-tui/Cargo.toml | head -n 1)
          for i in $(seq 1 30); do
            FOUND=$(curl -sS -A "claudectl-release-workflow" \
              "https://crates.io/api/v1/crates/claudectl-tui/${VERSION}" \
              | grep -o "\"num\":\"${VERSION}\"" | head -n 1 || true)
            if [ -n "$FOUND" ]; then
              echo "claudectl-tui ${VERSION} visible on crates.io"
              exit 0
            fi
            echo "waiting for claudectl-tui ${VERSION} (attempt ${i}/30)..."
            sleep 10
          done
          echo "::error::claudectl-tui ${VERSION} never appeared on crates.io after 5 minutes"
          exit 1
      - name: Publish claudectl binary
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"

  release:
    name: Release
    needs:
      - build
      - publish-crate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/claudectl-*.tar.gz
            artifacts/claudectl-*.tar.gz.sha256

  update-homebrew:
    name: Update Homebrew tap
    needs:
      - build
      - release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: claudectl

      - uses: actions/checkout@v4
        with:
          repository: mercurialsolo/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Render formula
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          cd claudectl
          ./scripts/render-homebrew-formula.sh \
            "$VERSION" \
            "$(awk '{print $1}' ../artifacts/claudectl-${TAG}-aarch64-apple-darwin.tar.gz.sha256)" \
            "$(awk '{print $1}' ../artifacts/claudectl-${TAG}-x86_64-apple-darwin.tar.gz.sha256)" \
            "$(awk '{print $1}' ../artifacts/claudectl-${TAG}-x86_64-unknown-linux-musl.tar.gz.sha256)" \
            "$(awk '{print $1}' ../artifacts/claudectl-${TAG}-aarch64-unknown-linux-musl.tar.gz.sha256)" \
            > ../homebrew-tap/Formula/claudectl.rb

      - name: Commit formula update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/claudectl.rb
          git diff --cached --quiet && exit 0
          git commit -m "claudectl ${GITHUB_REF#refs/tags/v}"
          git push
